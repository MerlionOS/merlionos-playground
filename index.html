<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MerlionOS Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: #12121a;
            border-bottom: 1px solid #2a2a3a;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #e0e0e0;
        }
        .logo-icon {
            width: 32px; height: 32px;
            background: #e94560;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: monospace;
            font-size: 16px;
            color: white;
        }
        .logo-text { font-size: 18px; font-weight: 700; }
        .logo-text span { color: #e94560; }
        .header-links { display: flex; gap: 16px; }
        .header-links a { color: #888; text-decoration: none; font-size: 14px; }
        .header-links a:hover { color: #e94560; }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 8px 24px;
            background: #0e0e16;
            border-bottom: 1px solid #1a1a2a;
            font-size: 13px;
            color: #666;
        }
        .status-indicator { display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
        .status-dot.connected { background: #0ecb81; }
        .status-dot.queued { background: #f0b90b; animation: pulse 1s infinite; }
        .status-dot.error { background: #f6465d; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

        .controls { display: flex; gap: 8px; margin-left: auto; }
        .btn {
            padding: 4px 14px;
            border: 1px solid #333;
            border-radius: 4px;
            background: #1a1a2a;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
        }
        .btn:hover { background: #2a2a3a; border-color: #e94560; color: #fff; }

        .timer { font-family: monospace; color: #f0b90b; font-size: 13px; }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        #terminal-container {
            width: 740px;
            height: 470px;
            background: #000;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            display: none;
        }

        .start-screen {
            text-align: center;
        }
        .start-screen h2 { font-size: 28px; margin-bottom: 8px; }
        .start-screen h2 span { color: #e94560; }
        .start-screen p { color: #888; margin-bottom: 24px; font-size: 15px; }
        .start-btn {
            padding: 12px 32px;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .start-btn:hover { background: #d63a54; }
        .start-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .specs { margin-top: 24px; font-size: 12px; color: #555; }

        .queue-info {
            text-align: center;
            display: none;
        }
        .queue-info .position {
            font-size: 48px;
            font-weight: 700;
            color: #f0b90b;
        }
        .queue-info p { color: #888; margin-top: 8px; }

        footer {
            padding: 12px 24px;
            text-align: center;
            font-size: 12px;
            color: #444;
            border-top: 1px solid #1a1a2a;
        }
        footer a { color: #e94560; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <a href="https://merlionos.org" class="logo">
            <div class="logo-icon">M</div>
            <div class="logo-text">Merlion<span>OS</span> Playground</div>
        </a>
        <div class="header-links">
            <a href="https://merlionos.org/getting-started/introduction/">Docs</a>
            <a href="https://github.com/MerlionOS/merlion-kernel">GitHub</a>
        </div>
    </header>

    <div class="status-bar">
        <div class="status-indicator">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-text">Ready</span>
        </div>
        <span class="timer" id="timer" style="display:none;"></span>
        <div class="controls">
            <span id="pool-info" style="font-size:12px;"></span>
            <button class="btn" id="btn-reset" style="display:none;" onclick="resetSession()">Reset</button>
        </div>
    </div>

    <main>
        <div class="start-screen" id="start-screen">
            <h2>Merlion<span>OS</span></h2>
            <p>A Rust x86_64 hobby OS — live in your browser</p>
            <button class="start-btn" id="start-btn" onclick="connect()">Boot MerlionOS</button>
            <div class="specs">
                QEMU x86_64 emulation | 128 MB RAM | Serial console
            </div>
        </div>

        <div class="queue-info" id="queue-screen">
            <p style="color:#f0b90b; font-size:14px;">Waiting for available slot...</p>
            <div class="position" id="queue-position">-</div>
            <p>in queue</p>
        </div>

        <div id="terminal-container"></div>
    </main>

    <footer>
        <a href="https://merlionos.org">merlionos.org</a> |
        Powered by QEMU x86_64 |
        Born for AI. Built by AI.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
    <script>
        // Configuration — change this to your server URL
        const WS_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'ws://localhost:3020/ws'
            : `wss://playground-api.merlionos.org/ws`;

        let ws = null;
        let term = null;
        let fitAddon = null;
        let timerInterval = null;
        let timeRemaining = 0;

        function setStatus(cls, text) {
            document.getElementById('status-dot').className = 'status-dot ' + cls;
            document.getElementById('status-text').textContent = text;
        }

        function showScreen(name) {
            document.getElementById('start-screen').style.display = name === 'start' ? 'block' : 'none';
            document.getElementById('queue-screen').style.display = name === 'queue' ? 'block' : 'none';
            document.getElementById('terminal-container').style.display = name === 'terminal' ? 'block' : 'none';
            document.getElementById('btn-reset').style.display = name === 'terminal' ? 'inline-block' : 'none';
        }

        function startTimer(secs) {
            timeRemaining = secs;
            const el = document.getElementById('timer');
            el.style.display = 'inline';
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeRemaining--;
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    el.textContent = 'Session expired';
                    return;
                }
                const m = Math.floor(timeRemaining / 60);
                const s = timeRemaining % 60;
                el.textContent = `${m}:${s.toString().padStart(2, '0')} remaining`;
                // Warn at 1 minute
                if (timeRemaining === 60) {
                    el.style.color = '#f6465d';
                }
            }, 1000);
        }

        function initTerminal() {
            if (term) return;
            term = new Terminal({
                theme: {
                    background: '#0a0a0f',
                    foreground: '#0ecb81',
                    cursor: '#e94560',
                },
                fontSize: 14,
                fontFamily: "'SF Mono', 'Fira Code', 'Consolas', monospace",
                cursorBlink: true,
            });
            fitAddon = new FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.open(document.getElementById('terminal-container'));
            fitAddon.fit();

            term.onData(function(data) {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'input', data: data }));
                }
            });

            window.addEventListener('resize', () => { if (fitAddon) fitAddon.fit(); });
        }

        function connect() {
            document.getElementById('start-btn').disabled = true;
            setStatus('queued', 'Connecting...');

            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';

            ws.onopen = () => {
                setStatus('queued', 'Connected, waiting for session...');
            };

            ws.onmessage = (event) => {
                if (typeof event.data === 'string') {
                    const msg = JSON.parse(event.data);
                    switch (msg.type) {
                        case 'status':
                            document.getElementById('pool-info').textContent =
                                `${msg.active}/${msg.max} active`;
                            break;
                        case 'queued':
                            showScreen('queue');
                            document.getElementById('queue-position').textContent = '#' + msg.position;
                            setStatus('queued', msg.message);
                            break;
                        case 'ready':
                            showScreen('terminal');
                            initTerminal();
                            setStatus('connected', 'Running');
                            startTimer(msg.timeout_secs);
                            term.focus();
                            break;
                        case 'error':
                            setStatus('error', msg.message);
                            showScreen('start');
                            document.getElementById('start-btn').disabled = false;
                            break;
                    }
                } else {
                    // Binary: serial output from QEMU
                    if (term) {
                        const bytes = new Uint8Array(event.data);
                        term.write(bytes);
                    }
                }
            };

            ws.onclose = () => {
                setStatus('error', 'Disconnected');
                if (timerInterval) clearInterval(timerInterval);
                document.getElementById('timer').style.display = 'none';
                // Show start screen again after a delay
                setTimeout(() => {
                    showScreen('start');
                    document.getElementById('start-btn').disabled = false;
                }, 2000);
            };

            ws.onerror = () => {
                setStatus('error', 'Connection failed — is the server running?');
                showScreen('start');
                document.getElementById('start-btn').disabled = false;
            };
        }

        function resetSession() {
            if (ws) ws.close();
            if (term) { term.dispose(); term = null; fitAddon = null; }
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timer').style.display = 'none';
            showScreen('start');
            document.getElementById('start-btn').disabled = false;
            setStatus('', 'Ready');
        }
    </script>
</body>
</html>
